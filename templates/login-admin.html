{% extends "base.html" %}
{% block title %}Administrativo{% endblock %}
{% block content %}
<div class="auth-container">
  <div class="auth-box">
    <h2>Administrativo</h2>
    <p class="section-subtitle">Acesso restrito à equipe</p>
    <form method="POST" class="auth-form">
      <div class="form-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" required placeholder="admin@conexoessolidarias.org" />
      </div>
      <div class="form-group">
        <label for="senha">Senha</label>
        <input type="password" id="senha" name="senha" required placeholder="••••••••" />
      </div>
      <button type="submit" class="btn btn-primary" style="justify-content:center;">Entrar</button>
    </form>
    <div class="auth-links">
      <a href="{{ url_for('auth.login_doador') }}">Voltar</a>
    </div>
  </div>
</div>
{% endblock %}
