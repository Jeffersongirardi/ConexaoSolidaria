{% extends "base.html" %}
{% block title %}Contato{% endblock %}
{% block content %}
<div class="contact-container">
  <div class="contact-header">
    <h2 class="section-title">Entre em Contato</h2>
    <p class="section-subtitle">Tem dúvidas ou sugestões? Adoraríamos ouvir você.</p>
  </div>

  <div class="contact-grid">
    <div class="contact-form">
      <h3 style="margin-bottom:1rem;font-weight:600;">Envie sua mensagem</h3>
      <form class="auth-form">
        <div class="form-group">
          <label for="nome">Nome</label>
          <input type="text" id="nome" name="nome" required placeholder="Seu nome" />
        </div>
        <div class="form-group">
          <label for="email">E-mail</label>
          <input type="email" id="email" name="email" required placeholder="seu@email.com" />
        </div>
        <div class="form-group">
          <label for="mensagem">Mensagem</label>
          <textarea id="mensagem" name="mensagem" rows="4" required placeholder="Escreva sua mensagem..."></textarea>
        </div>
        <button type="submit" class="btn btn-primary" style="justify-content:center;">Enviar</button>
      </form>
    </div>
    <div>
      <div class="info-card">
        <h4>E-mail</h4>
        <p style="color:var(--text-soft);">contato@conexoessolidarias.org</p>
      </div>
      <div class="info-card">
        <h4>Redes Sociais</h4>
        <p style="color:var(--text-soft);">Siga-nos para acompanhar nosso impacto!</p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
