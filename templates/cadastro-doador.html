{% extends "base.html" %}
{% block title %}Criar Conta — Doador{% endblock %}
{% block content %}
<div class="auth-container">
  <div class="auth-box">
    <h2>Criar Conta</h2>
    <p class="section-subtitle">Cadastre-se como doador</p>
    <form method="POST" class="auth-form">
      <div class="form-group">
        <label for="nome">Nome completo</label>
        <input type="text" id="nome" name="nome" required placeholder="Seu nome" />
      </div>
      <div class="form-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" required placeholder="seu@email.com" />
      </div>
      <div class="form-group">
        <label for="telefone">Telefone</label>
        <input type="text" id="telefone" name="telefone" placeholder="(41) 99999-9999" />
      </div>
      <div class="form-group">
        <label for="senha">Senha</label>
        <input type="password" id="senha" name="senha" required placeholder="Mínimo 6 caracteres" minlength="6" />
      </div>
      <button type="submit" class="btn btn-primary" style="justify-content:center;">Criar conta</button>
    </form>
    <div class="auth-links">
      <a href="{{ url_for('auth.login_doador') }}">Já tenho conta</a>
    </div>
  </div>
</div>
{% endblock %}
