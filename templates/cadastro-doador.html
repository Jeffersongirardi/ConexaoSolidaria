{% extends "base.html" %}
{% block title %}Criar Conta — Doador{% endblock %}
{% block content %}
<div class="auth-container">
  <div class="auth-box" style="max-width:500px;">
    <h2>Criar Conta</h2>
    <p class="section-subtitle">Cadastre-se como doador</p>
    <form method="POST" class="auth-form">
      <div class="form-group">
        <label for="nome">Nome completo</label>
        <input type="text" id="nome" name="nome" required placeholder="Seu nome" />
      </div>
      <div class="form-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" required placeholder="seu@email.com" />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="cpf">CPF</label>
          <input type="text" id="cpf" name="cpf" class="mask-cpf" placeholder="000.000.000-00" />
        </div>
        <div class="form-group">
          <label for="data_nascimento">Data de Nascimento</label>
          <input type="date" id="data_nascimento" name="data_nascimento" />
        </div>
      </div>
      <div class="form-group">
        <label for="telefone">Telefone / WhatsApp</label>
        <input type="text" id="whatsapp" name="whatsapp" class="mask-phone" placeholder="(41) 99999-9999" />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="cep">CEP</label>
          <input type="text" id="cep" name="cep" class="mask-cep" placeholder="00000-000" />
        </div>
        <div class="form-group">
          <label for="cidade">Cidade</label>
          <input type="text" id="cidade" name="cidade" placeholder="Curitiba" />
        </div>
      </div>
      <div class="form-group">
        <label for="estado">Estado</label>
        <select id="estado" name="estado">
          <option value="">Selecione</option>
          <option value="AC">AC</option><option value="AL">AL</option><option value="AP">AP</option>
          <option value="AM">AM</option><option value="BA">BA</option><option value="CE">CE</option>
          <option value="DF">DF</option><option value="ES">ES</option><option value="GO">GO</option>
          <option value="MA">MA</option><option value="MT">MT</option><option value="MS">MS</option>
          <option value="MG">MG</option><option value="PA">PA</option><option value="PB">PB</option>
          <option value="PR">PR</option><option value="PE">PE</option><option value="PI">PI</option>
          <option value="RJ">RJ</option><option value="RN">RN</option><option value="RS">RS</option>
          <option value="RO">RO</option><option value="RR">RR</option><option value="SC">SC</option>
          <option value="SP">SP</option><option value="SE">SE</option><option value="TO">TO</option>
        </select>
      </div>
      <div class="form-group">
        <label for="senha">Senha</label>
        <input type="password" id="senha" name="senha" required placeholder="Mínimo 6 caracteres" minlength="6" />
      </div>
      <button type="submit" class="btn btn-primary" style="justify-content:center;">Criar conta</button>
    </form>
    <div class="auth-links">
      <a href="{{ url_for('auth.login_doador') }}">Já tenho conta</a>
    </div>
  </div>
</div>
{% endblock %}
{% block extra_scripts %}
<script src="{{ url_for('static', filename='js/masks.js') }}"></script>
{% endblock %}
