{% extends "base.html" %}
{% block title %}Cadastro Doador - Conexões Solidárias{% endblock %}
{% block content %}
<main class="auth-container">
  <div class="auth-box">
    <h2>Cadastro - Doador</h2>
    <form method="POST" action="{{ url_for('auth.cadastro_doador') }}" class="auth-form">
      <div class="form-group">
        <label for="nome">Nome Completo</label>
        <input type="text" id="nome" name="nome" required />
      </div>
      <div class="form-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" required />
      </div>
      <div class="form-group">
        <label for="telefone">Telefone</label>
        <input type="text" id="telefone" name="telefone" />
      </div>
      <div class="form-group">
        <label for="senha">Senha</label>
        <input type="password" id="senha" name="senha" required />
      </div>
      <button type="submit" class="btn btn-primary">Criar Conta</button>
    </form>
    <div class="auth-links">
      <a href="{{ url_for('auth.login_doador') }}">Já tem conta? Faça login</a>
    </div>
  </div>
</main>
{% endblock %}
