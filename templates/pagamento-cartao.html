{% extends "base.html" %}
{% block title %}Cartão - Conexões Solidárias{% endblock %}
{% block content %}
<div class="dashboard-container" style="max-width:500px;">
  <section class="welcome-section">
    <h2>Pagamento com Cartão</h2>
    <p>R$ {{ "%.2f"|format(payment.valor) }}</p>
  </section>
  <section class="needs-section">
    <p style="color:var(--text-soft);font-size:0.9rem;margin-bottom:1rem;">Ambiente simulado — dados não são salvos.</p>
    <form method="POST" class="auth-form">
      <div class="form-group">
        <label>Número do cartão</label>
        <input type="text" class="mask-card" placeholder="0000 0000 0000 0000" required />
      </div>
      <div class="form-group">
        <label>Nome no cartão</label>
        <input type="text" placeholder="Nome como está no cartão" required />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Validade</label>
          <input type="text" class="mask-expiry" placeholder="MM/AA" required />
        </div>
        <div class="form-group">
          <label>CVV</label>
          <input type="text" class="mask-cvv" placeholder="123" required />
        </div>
      </div>
      <button type="submit" class="btn btn-primary" style="justify-content:center;">Pagar R$ {{ "%.2f"|format(payment.valor) }}</button>
      <a href="{{ url_for('dashboard.doador') }}" class="btn btn-outline" style="justify-content:center;text-decoration:none;">Cancelar</a>
    </form>
  </section>
</div>
{% endblock %}
{% block extra_scripts %}
<script src="{{ url_for('static', filename='js/masks.js') }}"></script>
{% endblock %}
