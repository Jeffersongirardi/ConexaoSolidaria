{% extends "base.html" %}
{% block title %}Entrar — Doador{% endblock %}
{% block content %}
<div class="auth-container">
  <div class="auth-box">
    <h2>Área do Doador</h2>
    <p class="section-subtitle">Acesse sua conta para fazer doações</p>
    <form method="POST" class="auth-form">
      <div class="form-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" required placeholder="seu@email.com" />
      </div>
      <div class="form-group">
        <label for="senha">Senha</label>
        <input type="password" id="senha" name="senha" required placeholder="••••••••" />
      </div>
      <button type="submit" class="btn btn-primary" style="justify-content:center;">Entrar</button>
    </form>
    <div class="auth-links">
      <a href="{{ url_for('auth.cadastro_doador') }}">Criar conta</a>
      <a href="{{ url_for('auth.login_instituicao') }}">Sou instituição</a>
    </div>
  </div>
</div>
{% endblock %}
