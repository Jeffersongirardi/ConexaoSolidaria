{% extends "base.html" %}
{% block title %}Cadastro Instituição - Conexões Solidárias{% endblock %}
{% block content %}
<main class="auth-container">
  <div class="auth-box" style="max-width:500px;">
    <h2>Cadastro - Instituição</h2>
    <form method="POST" action="{{ url_for('auth.cadastro_instituicao') }}" class="auth-form">
      <div class="form-group">
        <label for="nome">Nome do Responsável</label>
        <input type="text" id="nome" name="nome" required />
      </div>
      <div class="form-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" required />
      </div>
      <div class="form-group">
        <label for="telefone">Telefone</label>
        <input type="text" id="telefone" name="telefone" required />
      </div>
      <div class="form-group">
        <label for="cnpj">CNPJ</label>
        <input type="text" id="cnpj" name="cnpj" required placeholder="00.000.000/0000-00" />
      </div>
      <div class="form-group">
        <label for="razao_social">Razão Social</label>
        <input type="text" id="razao_social" name="razao_social" required />
      </div>
      <div class="form-group">
        <label for="endereco">Endereço</label>
        <input type="text" id="endereco" name="endereco" />
      </div>
      <div class="form-group">
        <label for="descricao">Descrição da Instituição</label>
        <textarea id="descricao" name="descricao" rows="3"></textarea>
      </div>
      <div class="form-group">
        <label for="senha">Senha</label>
        <input type="password" id="senha" name="senha" required />
      </div>
      <button type="submit" class="btn btn-primary">Solicitar Cadastro</button>
    </form>
    <div class="auth-links">
      <a href="{{ url_for('auth.login_instituicao') }}">Já tem cadastro? Faça login</a>
    </div>
  </div>
</main>
{% endblock %}
