{% extends "base.html" %}
{% block title %}Criar Conta — Instituição{% endblock %}
{% block content %}
<div class="auth-container">
  <div class="auth-box" style="max-width:500px;">
    <h2>Cadastrar Instituição</h2>
    <p class="section-subtitle">Sua conta passará por validação da nossa equipe</p>
    <form method="POST" class="auth-form">
      <div class="form-group">
        <label for="nome">Nome do responsável</label>
        <input type="text" id="nome" name="nome" required placeholder="Nome completo" />
      </div>
      <div class="form-group">
        <label for="email">E-mail institucional</label>
        <input type="email" id="email" name="email" required placeholder="contato@instituicao.org" />
      </div>
      <div class="form-group">
        <label for="cnpj">CNPJ</label>
        <input type="text" id="cnpj" name="cnpj" required placeholder="00.000.000/0000-00" />
      </div>
      <div class="form-group">
        <label for="razao_social">Razão social</label>
        <input type="text" id="razao_social" name="razao_social" required placeholder="Nome da instituição" />
      </div>
      <div class="form-group">
        <label for="telefone">Telefone</label>
        <input type="text" id="telefone" name="telefone" placeholder="(41) 99999-9999" />
      </div>
      <div class="form-group">
        <label for="endereco">Endereço</label>
        <input type="text" id="endereco" name="endereco" placeholder="Rua, número, bairro" />
      </div>
      <div class="form-group">
        <label for="descricao">Descrição da instituição</label>
        <textarea id="descricao" name="descricao" rows="3" placeholder="Conte um pouco sobre o trabalho da instituição..."></textarea>
      </div>
      <div class="form-group">
        <label for="senha">Senha</label>
        <input type="password" id="senha" name="senha" required placeholder="Mínimo 6 caracteres" minlength="6" />
      </div>
      <button type="submit" class="btn btn-primary" style="justify-content:center;">Solicitar cadastro</button>
    </form>
    <div class="auth-links">
      <a href="{{ url_for('auth.login_instituicao') }}">Já tenho conta</a>
    </div>
  </div>
</div>
{% endblock %}
