{% extends "base.html" %}
{% block title %}Alterar Senha{% endblock %}
{% block content %}
<div class="dashboard-container" style="max-width:500px;">
  <section class="welcome-section">
    <h2>Alterar Senha</h2>
    <p>Escolha uma nova senha para sua conta</p>
  </section>

  <section class="needs-section">
    <form method="POST" class="auth-form">
      <div class="form-group">
        <label for="senha_atual">Senha atual</label>
        <input type="password" name="senha_atual" required placeholder="••••••••" />
      </div>
      <div class="form-group">
        <label for="nova_senha">Nova senha</label>
        <input type="password" name="nova_senha" required placeholder="Mínimo 6 caracteres" minlength="6" />
      </div>
      <div class="form-group">
        <label for="confirmar_senha">Confirmar nova senha</label>
        <input type="password" name="confirmar_senha" required placeholder="Repita a nova senha" minlength="6" />
      </div>
      <button type="submit" class="btn btn-primary" style="justify-content:center;">Alterar Senha</button>
      <a href="{{ url_for('perfil.editar') }}" class="btn btn-outline" style="justify-content:center;text-decoration:none;">Voltar ao Perfil</a>
    </form>
  </section>
</div>
{% endblock %}
