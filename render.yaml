services:
  - type: web
    name: conexoes-solidarias
    runtime: java
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/conexoes-solidarias-1.0.0.jar --server.port=$PORT
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DATABASE_URL
        fromDatabase:
          name: conexoes-solidarias-db
          property: connectionString
      - key: JAVA_OPTS
        value: -Xmx512m -Xms256m
      # Opcional: customize admin credentials (defaults: admin@conexoessolidarias.org / admin123)
      # - key: ADMIN_EMAIL
      #   value: admin@conexoessolidarias.org
      # - key: ADMIN_PASSWORD
      #   value: admin123

databases:
  - name: conexoes-solidarias-db
    databaseName: conexoes_solidarias
    plan: free
