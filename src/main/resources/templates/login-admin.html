<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Admin — Conexões Solidárias')}"></head>
<body>
<div th:replace="~{fragments :: header}"></div>
<div th:replace="~{fragments :: flashMessages}"></div>

<main>
<div class="auth-container">
  <div class="auth-box">
    <h2>Administrativo</h2>
    <p class="section-subtitle">Acesso restrito à equipe</p>
    <form th:action="@{/auth/login}" method="post" class="auth-form">
      <input type="hidden" name="tipo" value="admin"/>
      <div class="form-group">
        <label for="email">E-mail</label>
        <input type="email" name="email" id="email" required placeholder="admin@email.com"/>
      </div>
      <div class="form-group">
        <label for="senha">Senha</label>
        <input type="password" name="senha" id="senha" required placeholder="Sua senha"/>
      </div>
      <button type="submit" class="btn btn-primary" style="justify-content:center;">Entrar</button>
    </form>
  </div>
</div>
</main>

<div th:replace="~{fragments :: footer}"></div>
</body>
</html>
