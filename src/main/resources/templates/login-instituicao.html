<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Entrar — Instituição')}"></head>
<body>
<div th:replace="~{fragments :: header}"></div>
<div th:replace="~{fragments :: flashMessages}"></div>

<main>
<div class="auth-container">
  <div class="auth-box">
    <h2>Entrar como Instituição</h2>
    <p class="section-subtitle">Acesse o painel da sua instituição</p>
    <form th:action="@{/auth/login}" method="post" class="auth-form">
      <input type="hidden" name="tipo" value="instituicao"/>
      <div class="form-group">
        <label for="email">E-mail</label>
        <input type="email" name="email" id="email" required placeholder="instituicao@email.com"/>
      </div>
      <div class="form-group">
        <label for="senha">Senha</label>
        <input type="password" name="senha" id="senha" required placeholder="Sua senha"/>
      </div>
      <button type="submit" class="btn btn-primary" style="justify-content:center;">Entrar</button>
    </form>
    <div class="auth-links">
      <a th:href="@{/auth/recuperar-senha}">Esqueci minha senha</a>
      <a th:href="@{/auth/cadastro-instituicao}">Cadastrar instituição</a>
      <a th:href="@{/auth/login-doador}">Sou Doador</a>
    </div>
  </div>
</div>
</main>

<div th:replace="~{fragments :: footer}"></div>
</body>
</html>
