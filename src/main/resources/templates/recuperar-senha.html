<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Recuperar Senha — Conexões Solidárias')}"></head>
<body>
<div th:replace="~{fragments :: header}"></div>
<div th:replace="~{fragments :: flashMessages}"></div>

<main>
<div class="auth-container">
  <div class="auth-box" style="max-width:440px;">
    <h2>Recuperar Senha</h2>
    <p class="section-subtitle">Digite seu e-mail para receber um link de redefinição</p>
    <form th:action="@{/auth/recuperar-senha}" method="post" class="auth-form">
      <div class="form-group">
        <label for="email">E-mail cadastrado</label>
        <input type="email" name="email" id="email" required placeholder="seu@email.com"/>
      </div>
      <div class="form-group">
        <label for="tipo">Tipo de conta</label>
        <select name="tipo" id="tipo">
          <option value="doador">Doador</option>
          <option value="instituicao">Instituição</option>
        </select>
      </div>
      <button type="submit" class="btn btn-primary" style="justify-content:center;">Enviar Link</button>
    </form>
    <div class="auth-links">
      <a th:href="@{/auth/login-doador}">Voltar ao login</a>
    </div>
  </div>
</div>
</main>

<div th:replace="~{fragments :: footer}"></div>
</body>
</html>
