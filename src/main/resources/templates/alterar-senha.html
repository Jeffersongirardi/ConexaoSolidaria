<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Alterar Senha')}"></head>
<body>
<div th:replace="~{fragments :: header}"></div>
<div th:replace="~{fragments :: flashMessages}"></div>

<main>
<div class="auth-container">
  <div class="auth-box">
    <h2>Alterar Senha</h2>
    <form th:action="@{/perfil/alterar-senha}" method="post" class="auth-form">
      <div class="form-group">
        <label for="senhaAtual">Senha atual</label>
        <input type="password" name="senhaAtual" id="senhaAtual" required placeholder="Sua senha atual"/>
      </div>
      <div class="form-group">
        <label for="novaSenha">Nova senha (mín. 6 caracteres)</label>
        <input type="password" name="novaSenha" id="novaSenha" required minlength="6" placeholder="Nova senha"/>
      </div>
      <div class="form-group">
        <label for="confirmarSenha">Confirmar nova senha</label>
        <input type="password" name="confirmarSenha" id="confirmarSenha" required placeholder="Repita a nova senha"/>
      </div>
      <button type="submit" class="btn btn-primary" style="justify-content:center;">Alterar Senha</button>
    </form>
    <div class="auth-links">
      <a th:href="@{/perfil}">Voltar ao perfil</a>
    </div>
  </div>
</div>
</main>

<div th:replace="~{fragments :: footer}"></div>
</body>
</html>
