<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Cadastro — Doador')}"></head>
<body>
<div th:replace="~{fragments :: header}"></div>
<div th:replace="~{fragments :: flashMessages}"></div>

<main>
<div class="auth-container">
  <div class="auth-box" style="max-width:500px;">
    <h2>Criar Conta — Doador</h2>
    <p class="section-subtitle">Cadastre-se para começar a doar</p>
    <form th:action="@{/auth/cadastro-doador}" method="post" class="auth-form">
      <div class="form-group">
        <label for="nome">Nome completo</label>
        <input type="text" name="nome" id="nome" required placeholder="Seu nome"/>
      </div>
      <div class="form-group">
        <label for="email">E-mail</label>
        <input type="email" name="email" id="email" required placeholder="seu@email.com"/>
      </div>
      <div class="form-group">
        <label for="senha">Senha (mín. 6 caracteres)</label>
        <input type="password" name="senha" id="senha" required minlength="6" placeholder="Sua senha"/>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="cpf">CPF</label>
          <input type="text" name="cpf" id="cpf" class="mask-cpf" placeholder="000.000.000-00"/>
        </div>
        <div class="form-group">
          <label for="dataNascimento">Data de Nascimento</label>
          <input type="date" name="dataNascimento" id="dataNascimento"/>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="telefone">Telefone</label>
          <input type="text" name="telefone" id="telefone" class="mask-phone" placeholder="(41) 99999-9999"/>
        </div>
        <div class="form-group">
          <label for="whatsapp">WhatsApp</label>
          <input type="text" name="whatsapp" id="whatsapp" class="mask-phone" placeholder="(41) 99999-9999"/>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="cep">CEP</label>
          <input type="text" name="cep" id="cep" class="mask-cep" placeholder="00000-000"/>
        </div>
        <div class="form-group">
          <label for="cidade">Cidade</label>
          <input type="text" name="cidade" id="cidade" placeholder="Curitiba"/>
        </div>
      </div>
      <div class="form-group">
        <label for="estado">Estado</label>
        <select name="estado" id="estado">
          <option value="PR">Paraná</option>
          <option value="SC">Santa Catarina</option>
          <option value="RS">Rio Grande do Sul</option>
          <option value="SP">São Paulo</option>
          <option value="RJ">Rio de Janeiro</option>
          <option value="outro">Outro</option>
        </select>
      </div>
      <div class="form-group" style="flex-direction:row;align-items:flex-start;gap:0.5rem;">
        <input type="checkbox" name="lgpd" id="lgpd" required style="width:auto;margin-top:0.25rem;"/>
        <label for="lgpd" style="font-weight:400;font-size:0.88rem;">
          Li e aceito a <a th:href="@{/privacidade}" target="_blank">Política de Privacidade</a> e autorizo o tratamento dos meus dados pessoais conforme a LGPD.
        </label>
      </div>
      <button type="submit" class="btn btn-primary" style="justify-content:center;">Criar Conta</button>
    </form>
    <div class="auth-links">
      <a th:href="@{/auth/login-doador}">Já tem conta? Entre</a>
    </div>
  </div>
</div>
</main>

<script th:src="@{/js/masks.js}"></script>
<div th:replace="~{fragments :: footer}"></div>
</body>
</html>
