<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Redefinir Senha — Conexões Solidárias')}"></head>
<body>
<div th:replace="~{fragments :: header}"></div>
<div th:replace="~{fragments :: flashMessages}"></div>

<main>
<div class="auth-container">
  <div class="auth-box" style="max-width:440px;">
    <h2>Redefinir Senha</h2>
    <p class="section-subtitle">Escolha uma nova senha para sua conta</p>
    <form th:action="@{/auth/redefinir-senha}" method="post" class="auth-form">
      <input type="hidden" name="token" th:value="${token}"/>
      <div class="form-group">
        <label for="senha">Nova senha (mín. 6 caracteres)</label>
        <input type="password" name="senha" id="senha" required minlength="6" placeholder="Nova senha"/>
      </div>
      <div class="form-group">
        <label for="confirmacao">Confirmar nova senha</label>
        <input type="password" name="confirmacao" id="confirmacao" required minlength="6" placeholder="Repita a senha"/>
      </div>
      <button type="submit" class="btn btn-primary" style="justify-content:center;">Redefinir Senha</button>
    </form>
  </div>
</div>
</main>

<div th:replace="~{fragments :: footer}"></div>
</body>
</html>
