<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments :: head(need.titulo + ' — Conexões Solidárias')}"></head>
<body>
<div th:replace="~{fragments :: header}"></div>
<div th:replace="~{fragments :: flashMessages}"></div>

<main>
<div class="section">
  <div class="section-inner" style="max-width:800px;">
    <a th:href="@{/necessidades}" class="btn btn-outline" style="margin-bottom:1rem;">&larr; Voltar</a>

    <div th:if="${not #lists.isEmpty(images)}" class="card-gallery">
      <img th:each="img : ${images}" th:src="${img.filename}" th:alt="${need.titulo}"
           class="gallery-image" th:onclick="'openModal(\'' + ${img.filename} + '\')'">
    </div>

    <div class="card" style="padding:2.5rem;">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:0.5rem;">
        <h2 style="font-size:1.6rem;font-weight:700;" th:text="${need.titulo}">Título</h2>
        <span class="badge" th:classappend="'badge-' + ${need.urgencia}" th:text="${need.urgencia}">Urgência</span>
      </div>

      <div style="margin-top:0.5rem;display:flex;gap:1rem;flex-wrap:wrap;font-size:0.9rem;color:var(--text-soft);">
        <span th:text="'Categoria: ' + ${#strings.capitalize(#strings.replace(need.categoria, '_', ' '))}">Categoria</span>
        <span th:text="'Meta: ' + ${need.quantidadeAlvo}">Meta</span>
        <span th:if="${need.aceitaFinanceiro}" class="badge badge-media">Aceita doações financeiras</span>
      </div>

      <p style="margin-top:1.5rem;line-height:1.8;white-space:pre-wrap;" th:text="${need.descricao}">Descrição</p>

      <div style="margin-top:1.5rem;">
        <label style="font-weight:600;font-size:0.9rem;">Progresso</label>
        <div class="progress-bar" style="margin-top:0.3rem;">
          <div class="progress" th:style="'width:' + ${need.progressoPercentual()} + '%;'"></div>
        </div>
        <p style="font-size:0.85rem;color:var(--text-soft);margin-top:0.3rem;" th:text="${need.progresso} + '% concluído'">Progresso</p>
      </div>
    </div>

    <div class="card" style="padding:2rem;margin-top:1.5rem;">
      <h3 style="margin-bottom:0.5rem;">
        <a th:href="@{/instituicoes/{id}(id=${need.institution.id})}" style="color:var(--primary);text-decoration:none;"
           th:text="${need.institution.razaoSocial}">Instituição</a>
      </h3>
      <p th:if="${need.institution.descricao != null}" style="color:var(--text-soft);font-size:0.92rem;"
         th:text="${need.institution.descricao.length() > 200 ? need.institution.descricao.substring(0, 200) : need.institution.descricao}">Descrição</p>
      <p th:if="${need.institution.endereco != null}" style="margin-top:0.5rem;font-size:0.9rem;" th:text="${need.institution.endereco}">Endereço</p>
    </div>

    <div class="card" style="padding:1.5rem;margin-top:1.5rem;text-align:center;">
      <h4 style="margin-bottom:0.8rem;font-size:0.95rem;">Compartilhe esta necessidade</h4>
      <div style="display:flex;justify-content:center;gap:0.75rem;flex-wrap:wrap;">
        <a th:href="@{https://wa.me/?text=__MSG__}" target="_blank"
           class="btn btn-outline share-btn share-whatsapp" title="Compartilhar no WhatsApp">WhatsApp</a>
        <a th:href="@{https://www.facebook.com/sharer/sharer.php?u=__URL__}" target="_blank"
           class="btn btn-outline share-btn share-facebook" title="Compartilhar no Facebook">Facebook</a>
        <a th:href="@{https://twitter.com/intent/tweet?text=__MSG__&url=__URL__}" target="_blank"
           class="btn btn-outline share-btn share-twitter" title="Compartilhar no Twitter/X">Twitter</a>
        <button onclick="copiarLink()" class="btn btn-outline share-btn share-link" title="Copiar link">Copiar Link</button>
      </div>
    </div>

    <div sec:authorize="hasRole('DOADOR')" th:if="${need.ativo}" class="card" style="padding:2rem;margin-top:1.5rem;">
      <h3>Quero doar para esta necessidade</h3>
      <div class="tabs" style="margin-top:1rem;">
        <button class="tab-btn active" data-tab="fisico" onclick="switchTab('fisico')">Doar Item</button>
        <button th:if="${need.aceitaFinanceiro}" class="tab-btn" data-tab="financeiro" onclick="switchTab('financeiro')">Doar em Dinheiro</button>
      </div>

      <div id="tab-fisico" class="tab-content active" style="margin-top:1rem;">
        <form method="POST" th:action="@{/dashboard/doar/{id}(id=${need.id})}" class="auth-form">
          <div class="form-group">
            <label for="item">Item que vou doar</label>
            <input type="text" name="item" required placeholder="Ex: Cesta básica, pacote de fraldas"/>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="quantidade">Quantidade</label>
              <input type="text" name="quantidade" required placeholder="Ex: 2 unidades, 5 kg"/>
            </div>
            <div class="form-group">
              <label for="categoria">Categoria</label>
              <select name="categoria">
                <option value="alimento">Alimento</option>
                <option value="roupa">Roupa</option>
                <option value="higiene">Higiene</option>
                <option value="material_escolar">Material Escolar</option>
                <option value="outro">Outro</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label for="observacao">Observação (opcional)</label>
            <textarea name="observacao" rows="2" placeholder="Alguma informação relevante..."></textarea>
          </div>
          <button type="submit" class="btn btn-primary" style="justify-content:center;">Registrar Intenção de Doação</button>
        </form>
      </div>

      <div th:if="${need.aceitaFinanceiro}" id="tab-financeiro" class="tab-content" style="display:none;margin-top:1rem;">
        <div class="payment-hub">
          <form method="POST" th:action="@{/dashboard/doar-financeiro/{id}(id=${need.id})}" class="auth-form">
            <div class="form-group">
              <label for="valor">Valor da doação (R$)</label>
              <input type="number" name="valor" step="0.01" min="1" required placeholder="50,00"/>
            </div>
            <div class="form-group">
              <label>Escolha o método</label>
              <div class="metodo-grid">
                <label class="metodo-card">
                  <input type="radio" name="metodo" value="pix" checked/>
                  <div class="metodo-icon">&#9989;</div>
                  <div class="metodo-label">PIX</div>
                </label>
                <label class="metodo-card">
                  <input type="radio" name="metodo" value="cartao"/>
                  <div class="metodo-icon">&#128179;</div>
                  <div class="metodo-label">Cartão</div>
                </label>
                <label class="metodo-card">
                  <input type="radio" name="metodo" value="transferencia"/>
                  <div class="metodo-icon">&#128184;</div>
                  <div class="metodo-label">Transferência</div>
                </label>
              </div>
            </div>
            <button type="submit" class="btn btn-primary" style="justify-content:center;">Ir para pagamento</button>
          </form>
        </div>
      </div>
    </div>

    <div sec:authorize="!isAuthenticated()" class="card" style="padding:2rem;margin-top:1.5rem;text-align:center;">
      <p>Faça login como doador para registrar sua doação.</p>
      <a th:href="@{/auth/login-doador}" class="btn btn-primary" style="margin-top:1rem;">Entrar como Doador</a>
    </div>
  </div>
</div>

<div id="imageModal" style="display:none;position:fixed;z-index:999;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);cursor:pointer;" onclick="closeModal()">
  <img id="modalImage" style="max-width:90%;max-height:90%;margin:5% auto;display:block;object-fit:contain;"/>
</div>

<script>
function openModal(src) {
  document.getElementById('modalImage').src = src;
  document.getElementById('imageModal').style.display = 'block';
}
function closeModal() {
  document.getElementById('imageModal').style.display = 'none';
}
function copiarLink() {
  navigator.clipboard.writeText(window.location.href).then(() => {
    const btn = event.target; btn.textContent = 'Copiado!';
    setTimeout(() => btn.textContent = 'Copiar Link', 2000);
  });
}
</script>
<style>
.share-btn { font-size:0.85rem; padding:0.4rem 1rem; }
.share-whatsapp:hover { background:#25D366; color:#fff; border-color:#25D366; }
.share-facebook:hover { background:#1877F2; color:#fff; border-color:#1877F2; }
.share-twitter:hover { background:#000; color:#fff; border-color:#000; }
.share-link:hover { background:var(--primary); color:#fff; border-color:var(--primary); }
</style>
</main>

<div th:replace="~{fragments :: footer}"></div>
</body>
</html>
