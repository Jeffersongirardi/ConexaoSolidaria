<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Blog — Conexões Solidárias')}"></head>
<body>
<div th:replace="~{fragments :: header}"></div>
<div th:replace="~{fragments :: flashMessages}"></div>

<main>
<div class="blog-container">
  <div class="blog-header">
    <h2>Blog</h2>
    <p>Histórias, novidades e informações sobre solidariedade em Curitiba</p>

    <div style="margin-top:1rem;display:flex;gap:0.5rem;flex-wrap:wrap;justify-content:center;">
      <a th:href="@{/blog}" class="btn btn-outline" style="padding:0.4rem 1rem;">Todas</a>
      <a th:each="cat : ${categorias}" th:href="@{/blog(categoria=${cat})}"
         class="btn btn-outline" style="padding:0.4rem 1rem;"
         th:text="${#strings.capitalize(cat)}">Categoria</a>
    </div>
  </div>

  <div th:if="${not pagination.isEmpty()}" class="blog-grid">
    <div class="blog-post" th:each="post : ${pagination}">
      <div th:if="${post.imagemUrl}" class="post-image" th:style="'background-image:url(' + ${post.imagemUrl} + ');background-size:cover;background-position:center;'"></div>
      <div th:if="${post.imagemUrl == null}" class="post-image" style="background:linear-gradient(135deg, var(--primary-light), var(--primary));">
        <span style="font-size:2.5rem;color:#fff;">&#128214;</span>
      </div>
      <div class="post-content">
        <h3 th:text="${post.titulo}">Título</h3>
        <p class="post-meta">
          <span th:text="${post.categoria}">Categoria</span> &middot;
          <span th:text="${#temporals.format(post.dataPublicacao, 'dd/MM/yyyy')}">Data</span>
        </p>
        <p th:text="${post.resumo}">Resumo</p>
        <a th:href="@{/blog/{slug}(slug=${post.slug})}" class="btn btn-outline" style="margin-top:0.75rem;">Ler mais</a>
      </div>
    </div>
  </div>
  <div th:if="${pagination.isEmpty()}">
    <p style="text-align:center;padding:3rem;color:var(--text-soft);">Nenhum post publicado ainda.</p>
  </div>

  <div class="pagination" th:if="${pagination.totalPages > 1}" style="margin-top:2rem;">
    <span th:text="'Página ' + (${pagination.number} + 1) + ' de ' + ${pagination.totalPages}">Página</span>
  </div>
</div>
</main>

<div th:replace="~{fragments :: footer}"></div>
</body>
</html>
