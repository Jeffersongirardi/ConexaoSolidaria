<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Notificações')}"></head>
<body>
<div th:replace="~{fragments :: header}"></div>
<div th:replace="~{fragments :: flashMessages}"></div>

<main>
<div class="dashboard-container">
  <section class="needs-section">
    <div class="section-header">
      <h3>Notificações</h3>
      <a th:href="@{/notificacoes/ler-todas}" class="btn btn-outline">Marcar todas como lidas</a>
    </div>

    <div th:if="${not #lists.isEmpty(notificacoes)}">
      <div th:each="n : ${notificacoes}"
           style="padding:1rem;margin-bottom:0.5rem;background:var(--bg);border-radius:8px;
                  border-left:4px solid ${n.lida} ? var(--border) : var(--primary-light);
                  opacity: ${n.lida} ? 0.7 : 1;">
        <a th:href="@{/notificacoes/ler/{id}(id=${n.id})}" style="text-decoration:none;color:inherit;display:block;">
          <p style="font-weight:${n.lida} ? 400 : 600;" th:text="${n.mensagem}">Mensagem</p>
          <small style="color:var(--text-soft);" th:text="${#temporals.format(n.dataCriacao, 'dd/MM/yyyy HH:mm')}">Data</small>
        </a>
      </div>
    </div>
    <div th:if="${#lists.isEmpty(notificacoes)}">
      <p style="text-align:center;padding:2rem;color:var(--text-soft);">Nenhuma notificação.</p>
    </div>
  </section>
</div>
</main>

<div th:replace="~{fragments :: footer}"></div>
</body>
</html>
